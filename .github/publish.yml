# npm publish workflow — NOT ACTIVE.
#
# GitHub only runs workflows located in `.github/workflows/`. This file lives one
# level up on purpose, so it's version-controlled and ready but won't trigger yet.
#
# To activate:
#   1. Add an npm "Automation" access token as the repo secret `NPM_TOKEN`.
#   2. Move this file to `.github/workflows/publish.yml`.
#   3. (Optional) Re-enable `"provenance": true` under `publishConfig` in
#      package.json — provenance requires this OIDC-enabled CI run.
#
# Release flow once active: `npm version patch|minor|major && git push --follow-tags`.

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
